name: Daily Portfolio Insight Refresh

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 15 * * *' # 15:00 UTC is 00:00 KST
  workflow_dispatch: # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade google-generativeai
          npm install -g vercel

      - name: Refresh, Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Refresh Data
          chmod +x ./refresh-data.sh
          ./refresh-data.sh || echo "⚠️ Data refresh had some issues, continuing to push available data."

          # 2. Add and Commit
          git add public/data/
          git commit -m "📈 [AUTO] Refresh portfolio data and AI insights" || exit 0

          # 3. Push with Retry
          for i in {1..5}; do
            git pull --rebase origin main
            if git push origin main; then
              echo "✅ Successfully pushed changes"
              exit 0
            fi
            echo "🔄 Push failed, retrying in 5 seconds... ($i/5)"
            sleep 5
          done
          echo "❌ Failed to push after 5 attempts"
          exit 1

      - name: Trigger Vercel Deployment
        if: always()
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}
