name: Daily Portfolio Insight Refresh

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 15 * * *' # 15:00 UTC is 00:00 KST
  workflow_dispatch: # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install google-generativeai
          npm install -g vercel

      - name: Refresh Data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./refresh-data.sh
          ./refresh-data.sh

      - name: Analyze with AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 analyze-portfolio.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          git commit -m "📈 [AUTO] Refresh portfolio data and AI insights" || echo "No changes to commit"
          git push
